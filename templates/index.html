<!DOCTYPE html>
<html>
<head>
    <title>Smart Hostel</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- 🌙 DARK MODE TOGGLE -->
<div style="text-align:right; padding:10px;">
    <button class="toggle-btn" onclick="toggleTheme()">🌙 / ☀️</button>
</div>

<div class="container">

    <h1 class="heading-main">Smart Hostel Room Allocation</h1>

    <!-- ADD NEW STUDENT -->
    <div class="card">
        <h2 class="heading-sub">Add New Student</h2>

        <form action="/submit" method="POST">

            <input type="number" name="student_id" placeholder="Student ID" min="1" required>

            <input type="number" name="sleep_time" placeholder="Sleep Time (0-23)" min="0" max="23" required>
            <input type="number" name="wake_time" placeholder="Wake Time (0-23)" min="0" max="23" required>
            <input type="number" name="study_hours" placeholder="Study Hours (0-12)" min="0" max="12" required>

            <input type="number" name="silence_preference" placeholder="Silence (1-10)" min="1" max="10" required>
            <input type="number" name="cleanliness_level" placeholder="Cleanliness (1-10)" min="1" max="10" required>

            <input type="number" name="introversion" placeholder="Introversion (1-10)" min="1" max="10" required>
            <input type="number" name="emotional_stability" placeholder="Emotional Stability (1-10)" min="1" max="10" required>
            <input type="number" name="agreeableness" placeholder="Agreeableness (1-10)" min="1" max="10" required>

            <h3>⭐ Set Your Priorities</h3>

            <!-- PRIORITY ROWS -->
            <div class="priority-row">
                <label>Sleep Time</label>
                <input type="hidden" name="sleep_p" id="sleep_p" required>
                <div class="stars" data-input="sleep_p"></div>
            </div>

            <div class="priority-row">
                <label>Wake Time</label>
                <input type="hidden" name="wake_p" id="wake_p" required>
                <div class="stars" data-input="wake_p"></div>
            </div>

            <div class="priority-row">
                <label>Study Hours</label>
                <input type="hidden" name="study_p" id="study_p" required>
                <div class="stars" data-input="study_p"></div>
            </div>

            <div class="priority-row">
                <label>Silence</label>
                <input type="hidden" name="silence_p" id="silence_p" required>
                <div class="stars" data-input="silence_p"></div>
            </div>

            <div class="priority-row">
                <label>Cleanliness</label>
                <input type="hidden" name="clean_p" id="clean_p" required>
                <div class="stars" data-input="clean_p"></div>
            </div>

            <div class="priority-row">
                <label>Introversion</label>
                <input type="hidden" name="intro_p" id="intro_p" required>
                <div class="stars" data-input="intro_p"></div>
            </div>

            <div class="priority-row">
                <label>Emotional Stability</label>
                <input type="hidden" name="emotion_p" id="emotion_p" required>
                <div class="stars" data-input="emotion_p"></div>
            </div>

            <div class="priority-row">
                <label>Agreeableness</label>
                <input type="hidden" name="agree_p" id="agree_p" required>
                <div class="stars" data-input="agree_p"></div>
            </div>

            <button type="submit">Find Roommate</button>
        </form>
    </div>

    <!-- CHECK EXISTING -->
    <div class="card">
        <h2 class="heading-sub">Check Existing Match</h2>

        <form action="/check" method="POST">
            <input type="number" name="student_id" placeholder="Enter Student ID" min="1" required>
            <button type="submit">Check Match</button>
        </form>
    </div>

    <!-- COMPARE TWO STUDENTS -->
    <div class="card">
        <h2 class="heading-sub">Compare Two Students</h2>

        <form action="/check_two" method="POST">
            <input type="number" name="student1" placeholder="Student ID 1" required>
            <input type="number" name="student2" placeholder="Student ID 2" required>
            <button type="submit">Check Compatibility</button>
        </form>
    </div>

</div>

<!-- ⭐ STAR SCRIPT -->
<script>
document.querySelectorAll(".stars").forEach(container => {
    const inputId = container.dataset.input;
    const hiddenInput = document.getElementById(inputId);

    for (let i = 1; i <= 5; i++) {
        const star = document.createElement("span");
        star.innerHTML = "★";
        star.classList.add("star");

        star.addEventListener("click", () => {
            hiddenInput.value = i;
            updateStars(container, i);
        });

        star.addEventListener("mouseover", () => {
            updateStars(container, i);
        });

        star.addEventListener("mouseout", () => {
            updateStars(container, hiddenInput.value || 0);
        });

        container.appendChild(star);
    }

    function updateStars(container, value) {
        const stars = container.querySelectorAll(".star");
        stars.forEach((s, index) => {
            if (index < value) {
                s.classList.add("active");
            } else {
                s.classList.remove("active");
            }
        });
    }
});
</script>

<!-- 🌙 DARK MODE SCRIPT -->
<script>
function toggleTheme() {
    document.body.classList.toggle("light-mode");
}
</script>

<!-- VALIDATION -->
<script>
document.querySelectorAll("form").forEach(form => {
    form.addEventListener("submit", function(e) {
        let inputs = form.querySelectorAll("input[type='number']");
        for (let input of inputs) {
            let value = Number(input.value);

            if (!Number.isInteger(value) || value < 0) {
                alert("❌ Only positive integers allowed!");
                e.preventDefault();
                return;
            }
        }
    });
});
</script>

</body>
</html>
