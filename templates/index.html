<!DOCTYPE html>
<html>
<head>
    <title>Smart Hostel</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🏠 Smart Hostel Room Allocation</h1>

    <!-- NEW STUDENT -->
    <div class="card">
        <h2>Add New Student</h2>

        <form action="/submit" method="POST">

            <input type="number" name="student_id" placeholder="Student ID" min="1" step="1"  required>

            <input type="number" name="sleep_time" placeholder="Sleep Time (e.g. 23)" min="0" step="1" required>
            <input type="number" name="wake_time" placeholder="Wake Time (e.g. 6)" min="0" step="1" required>
            <input type="number" name="study_hours" placeholder="Study Hours" min="0" step="1" required>

            <input type="number" name="silence_preference" placeholder="Silence Preference (1-10)" min="1" max="10" required>
            <input type="number" name="cleanliness_level" placeholder="Cleanliness Level (1-10)" min="1" max="10" required>

            <input type="number" name="introversion" placeholder="Introversion (1-10)" min="1" max="10" required>
            <input type="number" name="emotional_stability" placeholder="Emotional Stability (1-10)" min="1" max="10" required>
            <input type="number" name="agreeableness" placeholder="Agreeableness (1-10)" min="1" max="10" required>

            <button type="submit">Find Roommate</button>
        </form>
    </div>

    <!-- CHECK MATCH -->
    <div class="card">
        <h2>Check Existing Match</h2>

        <form action="/check" method="POST">
            <input type="text" name="student_id" placeholder="Enter Student ID" required>
            <button type="submit">Check Match</button>
        </form>
    </div>

</div>

<!-- VALIDATION -->
<script>
document.querySelectorAll("form").forEach(form => {
    form.addEventListener("submit", function(e) {
        let inputs = form.querySelectorAll("input[type='number']");
        for (let input of inputs) {
            let value = Number(input.value);
            if (!Number.isInteger(value) || value < 0) {
                alert("❌ Only positive integers allowed!");
                e.preventDefault();
                return;
            }
        }
    });
});
</script>

</body>
</html>
